name: Backend Image Publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional extra tag like staging-20260428 or v0.1.0
        required: false
        type: string
      publish_latest:
        description: Also publish the latest tag
        required: false
        type: boolean
        default: false

concurrency:
  group: backend-image-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish-backend-image:
    name: publish-backend-image
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve GHCR image tags
        id: image
        shell: bash
        env:
          EXTRA_IMAGE_TAG: ${{ inputs.image_tag }}
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
        run: |
          set -euo pipefail

          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_repo="ghcr.io/${owner}/rocketflow-backend"
          sha_tag="${image_repo}:sha-${GITHUB_SHA::12}"
          tags="${sha_tag}"

          if [ -n "${EXTRA_IMAGE_TAG}" ]; then
            sanitized_tag="$(echo "${EXTRA_IMAGE_TAG}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g' | sed 's#-\{2,\}#-#g' | sed 's#^-##; s#-$##')"
            if [ -z "${sanitized_tag}" ]; then
              echo "The image_tag input became empty after sanitization." >&2
              exit 1
            fi

            tags="${tags},${image_repo}:${sanitized_tag}"
          fi

          if [ "${PUBLISH_LATEST}" = "true" ]; then
            tags="${tags},${image_repo}:latest"
          fi

          echo "image_repo=${image_repo}" >> "${GITHUB_OUTPUT}"
          echo "primary_tag=${sha_tag}" >> "${GITHUB_OUTPUT}"
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Run backend test and migration gate
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress test

      - name: Build backend Docker image
        working-directory: backend
        run: docker build -t "${{ steps.image.outputs.primary_tag }}" .

      - name: Run backend container health smoke
        shell: pwsh
        run: |
          ./scripts/Invoke-BackendDockerRuntimeSmoke.ps1 `
            -BackendImage "${{ steps.image.outputs.primary_tag }}" `
            -BackendPort 28080 `
            -PostgresPort 15432

      - name: Create additional local tags
        shell: bash
        env:
          TAGS: ${{ steps.image.outputs.tags }}
          PRIMARY_TAG: ${{ steps.image.outputs.primary_tag }}
        run: |
          set -euo pipefail
          IFS=',' read -ra tags <<< "${TAGS}"
          for tag in "${tags[@]}"; do
            if [ "${tag}" != "${PRIMARY_TAG}" ]; then
              docker tag "${PRIMARY_TAG}" "${tag}"
            fi
          done

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image tags
        shell: bash
        env:
          TAGS: ${{ steps.image.outputs.tags }}
        run: |
          set -euo pipefail
          IFS=',' read -ra tags <<< "${TAGS}"
          for tag in "${tags[@]}"; do
            docker push "${tag}"
          done

      - name: Upload backend container smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-image-publish-smoke-artifacts
          path: tmp/docker-smoke
          if-no-files-found: ignore
