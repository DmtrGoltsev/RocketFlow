spring:
  datasource:
    url: ${ROCKETFLOW_DB_URL:jdbc:postgresql://localhost:5432/rocketflow}
    username: ${ROCKETFLOW_DB_USERNAME:rocketflow}
    password: ${ROCKETFLOW_DB_PASSWORD:rocketflow}

server:
  error:
    include-message: always

rocketflow:
  web:
    cors:
      allowed-origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
      allowed-origin-patterns:
        - http://localhost:[*]
        - http://127.0.0.1:[*]
  notifications:
    scheduler:
      enabled: false
    fcm:
      enabled: false
