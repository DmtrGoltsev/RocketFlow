name: Деплой backend в HexCore Prod

on:
  push:
    branches:
      - release_1
      - MVP2
  workflow_dispatch:
    inputs:
      health_url:
        description: "Опциональный health URL, например http://45.10.110.42/rocket-api/health"
        required: false
        type: string

concurrency:
  group: backend-hexcore-prod-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-backend:
    name: deploy-backend
    runs-on: ubuntu-24.04
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/release_1' || github.ref == 'refs/heads/MVP2'

    defaults:
      run:
        shell: bash

    steps:
      - name: Получить код репозитория
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Настроить Temurin JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Собрать backend и пройти тесты
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress package

      - name: Настроить Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Собрать web для HexCore
        working-directory: web
        env:
          VITE_API_BASE_URL: /rocket-api
        run: |
          npm ci
          npm run build

      - name: Упаковать web build
        run: |
          set -euo pipefail
          tar -czf "rocketflow-web-sha-${GITHUB_SHA::12}.tar.gz" -C web/dist .

      - name: Подготовить SSH-доступ к HexCore
        env:
          HEXCORE_PROD_SSH_HOST: ${{ secrets.HEXCORE_PROD_SSH_HOST }}
          HEXCORE_PROD_SSH_USER: ${{ secrets.HEXCORE_PROD_SSH_USER }}
          HEXCORE_PROD_SSH_PRIVATE_KEY: ${{ secrets.HEXCORE_PROD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          echo "Deploy context:"
          echo "  event=${GITHUB_EVENT_NAME}"
          echo "  ref=${GITHUB_REF}"
          echo "  sha=${GITHUB_SHA}"
          echo "Push auto deploy is intentionally limited to refs/heads/release_1 and refs/heads/MVP2."

          missing=0
          for secret_name in HEXCORE_PROD_SSH_HOST HEXCORE_PROD_SSH_USER HEXCORE_PROD_SSH_PRIVATE_KEY; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Required secret ${secret_name} is not configured or is empty."
              missing=1
            else
              echo "Secret ${secret_name}: present"
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          install -d -m 700 ~/.ssh
          printf '%s\n' "${HEXCORE_PROD_SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/rocketflow_prod_deploy
          chmod 600 ~/.ssh/rocketflow_prod_deploy
          ssh-keyscan -H "${HEXCORE_PROD_SSH_HOST}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Загрузить backend jar и web build на сервер
        env:
          HEXCORE_PROD_SSH_HOST: ${{ secrets.HEXCORE_PROD_SSH_HOST }}
          HEXCORE_PROD_SSH_USER: ${{ secrets.HEXCORE_PROD_SSH_USER }}
        run: |
          set -euo pipefail

          jar_path="$(ls backend/target/rocketflow-backend-*.jar | head -n 1)"
          remote_jar_path="/opt/rocketflow/releases/rocketflow-backend-sha-${GITHUB_SHA::12}.jar"
          web_archive="rocketflow-web-sha-${GITHUB_SHA::12}.tar.gz"
          remote_web_path="/opt/rocketflow/web-releases/${web_archive}"
          ssh_opts=(
            -i ~/.ssh/rocketflow_prod_deploy
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o ConnectTimeout=15
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=~/.ssh/known_hosts
          )

          ssh "${ssh_opts[@]}" "${HEXCORE_PROD_SSH_USER}@${HEXCORE_PROD_SSH_HOST}" \
            'set -euo pipefail; echo "SSH smoke: user=$(whoami) host=$(hostname)"; test -w /opt/rocketflow/releases; test -w /opt/rocketflow/web-releases'

          scp \
            "${ssh_opts[@]}" \
            "${jar_path}" \
            "${HEXCORE_PROD_SSH_USER}@${HEXCORE_PROD_SSH_HOST}:${remote_jar_path}"

          scp \
            "${ssh_opts[@]}" \
            "${web_archive}" \
            "${HEXCORE_PROD_SSH_USER}@${HEXCORE_PROD_SSH_HOST}:${remote_web_path}"

      - name: Переключить релиз и перезапустить приложение
        env:
          HEXCORE_PROD_SSH_HOST: ${{ secrets.HEXCORE_PROD_SSH_HOST }}
          HEXCORE_PROD_SSH_USER: ${{ secrets.HEXCORE_PROD_SSH_USER }}
        run: |
          set -euo pipefail
          ssh_opts=(
            -i ~/.ssh/rocketflow_prod_deploy
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o ConnectTimeout=15
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=~/.ssh/known_hosts
          )

          ssh "${ssh_opts[@]}" \
            "${HEXCORE_PROD_SSH_USER}@${HEXCORE_PROD_SSH_HOST}" \
            "sudo -n /usr/local/sbin/rocketflow-promote-latest"

      - name: Проверить production health
        env:
          HEXCORE_PROD_SSH_HOST: ${{ secrets.HEXCORE_PROD_SSH_HOST }}
          INPUT_HEALTH_URL: ${{ inputs.health_url }}
        run: |
          set -euo pipefail

          health_url="${INPUT_HEALTH_URL:-http://${HEXCORE_PROD_SSH_HOST}/rocket-api/health}"

          for attempt in {1..40}; do
            if response="$(curl --fail --silent --show-error "${health_url}")" && grep -q '"status":"UP"' <<< "${response}"; then
              echo "Production backend health returned UP."
              exit 0
            fi

            echo "Ждем production health backend, попытка ${attempt}/40..."
            sleep 5
          done

          echo "Production backend не вернул UP за отведенное время." >&2
          exit 1

      - name: Проверить production web
        env:
          HEXCORE_PROD_SSH_HOST: ${{ secrets.HEXCORE_PROD_SSH_HOST }}
        run: |
          set -euo pipefail
          if curl --fail --silent --show-error "http://${HEXCORE_PROD_SSH_HOST}/rocket/" | grep -qi '<div id="root"'; then
            echo "Production web root marker is present."
          else
            echo "::error::Production web check failed: root marker was not found or the request failed." >&2
            exit 1
          fi
