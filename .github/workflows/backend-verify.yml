name: Backend Verify

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: backend-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-verify:
    name: backend-verify
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend test and migration gate
        run: mvn --batch-mode --no-transfer-progress test

      - name: Build backend Docker image
        run: docker build -t rocketflow-backend:ci .

      - name: Run backend container health smoke
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          ./scripts/Invoke-BackendDockerRuntimeSmoke.ps1 `
            -BackendImage "rocketflow-backend:ci" `
            -BackendPort 28080 `
            -PostgresPort 15432

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports
          if-no-files-found: ignore

      - name: Upload backend container smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-container-smoke-artifacts
          path: tmp/docker-smoke
          if-no-files-found: ignore
