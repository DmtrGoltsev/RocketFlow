spring:
  application:
    name: rocketflow-backend
  datasource:
    url: ${ROCKETFLOW_DB_URL}
    username: ${ROCKETFLOW_DB_USERNAME}
    password: ${ROCKETFLOW_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info

rocketflow:
  web:
    cors:
      allowed-origins: ${ROCKETFLOW_ALLOWED_ORIGINS:http://45.10.110.42}
      allowed-origin-patterns: ${ROCKETFLOW_ALLOWED_ORIGIN_PATTERNS:http://localhost:[*],http://127.0.0.1:[*]}
  notifications:
    scheduler:
      enabled: ${ROCKETFLOW_NOTIFICATIONS_SCHEDULER_ENABLED:false}
      fixed-delay: ${ROCKETFLOW_NOTIFICATIONS_SCHEDULER_FIXED_DELAY:PT1M}
      initial-delay: ${ROCKETFLOW_NOTIFICATIONS_SCHEDULER_INITIAL_DELAY:PT15S}
      advisory-lock-key: ${ROCKETFLOW_NOTIFICATIONS_SCHEDULER_ADVISORY_LOCK_KEY:7304001}
    fcm:
      enabled: ${ROCKETFLOW_NOTIFICATIONS_FCM_ENABLED:false}
      project-id: ${ROCKETFLOW_NOTIFICATIONS_FCM_PROJECT_ID:}
      credentials-json: ${ROCKETFLOW_NOTIFICATIONS_FCM_CREDENTIALS_JSON:}
      credentials-path: ${ROCKETFLOW_NOTIFICATIONS_FCM_CREDENTIALS_PATH:}

server:
  error:
    include-message: never
